<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Manutenção - Aurora ERP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Módulo de Manutenção</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="manutencao.html">Manutenção</a>
            <a href="tripulacao.html">Tripulação</a>
            <a href="trafego.html">Tráfego</a>
            <a href="suprimentos.html">Suprimentos</a>
            <a href="bilhetagem.html">Bilhetagem</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>Cadastrar manutenção</h2>
            <form id="formManutencao">
                <input type="number" id="veiculo_id" placeholder="ID do veículo" required>
                <input type="text" id="tipo" placeholder="Tipo da manutenção" required>
                <input type="text" id="descricao" placeholder="Descrição" required>
                <input type="number" id="km" placeholder="KM" required>
                <button type="submit">Salvar manutenção</button>
            </form>
        </div>

        <div class="table-container">
            <h2>Lista de manutenções</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Veículo</th>
                        <th>Tipo</th>
                        <th>Descrição</th>
                        <th>KM</th>
                    </tr>
                </thead>
                <tbody id="tabelaManutencao"></tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function carregarManutencoes() {
            const resposta = await getData("/manutencao/");
            if (resposta && resposta.dados) {
                preencherTabela("tabelaManutencao", resposta.dados, ["id", "veiculo_id", "tipo", "descricao", "km"]);
            }
        }

        document.getElementById("formManutencao").addEventListener("submit", async function(e) {
            e.preventDefault();

            const payload = {
                veiculo_id: Number(document.getElementById("veiculo_id").value),
                tipo: document.getElementById("tipo").value,
                descricao: document.getElementById("descricao").value,
                km: Number(document.getElementById("km").value)
            };

            const ok = await postData("/manutencao/", payload);
            if (ok) {
                this.reset();
                carregarManutencoes();
            }
        });

        carregarManutencoes();
    </script>
</body>
</html>
