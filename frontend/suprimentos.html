<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Suprimentos - Aurora ERP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Módulo de Suprimentos</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="manutencao.html">Manutenção</a>
            <a href="tripulacao.html">Tripulação</a>
            <a href="trafego.html">Tráfego</a>
            <a href="suprimentos.html">Suprimentos</a>
            <a href="bilhetagem.html">Bilhetagem</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>Registrar abastecimento</h2>
            <form id="formSuprimentos">
                <input type="number" id="veiculo_id" placeholder="ID do veículo" required>
                <input type="text" id="tipo" placeholder="Tipo" value="combustivel" required>
                <input type="number" step="0.01" id="litros" placeholder="Litros" required>
                <input type="number" step="0.01" id="valor_total" placeholder="Valor total" required>
                <input type="number" step="0.01" id="km_referencia" placeholder="KM de referência" required>
                <button type="submit">Salvar suprimento</button>
            </form>
        </div>

        <div class="table-container">
            <h2>Lista de suprimentos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Veículo</th>
                        <th>Tipo</th>
                        <th>Litros</th>
                        <th>Valor</th>
                        <th>KM</th>
                    </tr>
                </thead>
                <tbody id="tabelaSuprimentos"></tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function carregarSuprimentos() {
            const resposta = await getData("/suprimentos/");
            if (resposta && resposta.dados) {
                preencherTabela("tabelaSuprimentos", resposta.dados, ["id", "veiculo_id", "tipo", "litros", "valor_total", "km_referencia"]);
            }
        }

        document.getElementById("formSuprimentos").addEventListener("submit", async function(e) {
            e.preventDefault();

            const payload = {
                veiculo_id: Number(document.getElementById("veiculo_id").value),
                tipo: document.getElementById("tipo").value,
                litros: Number(document.getElementById("litros").value),
                valor_total: Number(document.getElementById("valor_total").value),
                km_referencia: Number(document.getElementById("km_referencia").value)
            };

            const ok = await postData("/suprimentos/", payload);
            if (ok) {
                this.reset();
                document.getElementById("tipo").value = "combustivel";
                carregarSuprimentos();
            }
        });

        carregarSuprimentos();
    </script>
</body>
</html>
