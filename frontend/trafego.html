<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tráfego - Aurora ERP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Módulo de Tráfego</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="manutencao.html">Manutenção</a>
            <a href="tripulacao.html">Tripulação</a>
            <a href="trafego.html">Tráfego</a>
            <a href="suprimentos.html">Suprimentos</a>
            <a href="bilhetagem.html">Bilhetagem</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>Registrar viagem</h2>
            <form id="formTrafego">
                <input type="text" id="linha" placeholder="Linha" required>
                <input type="number" id="veiculo_id" placeholder="ID do veículo" required>
                <input type="text" id="motorista" placeholder="Motorista" required>
                <button type="submit">Salvar viagem</button>
            </form>
        </div>

        <div class="table-container">
            <h2>Lista de viagens</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Linha</th>
                        <th>Veículo</th>
                        <th>Motorista</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tabelaTrafego"></tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function carregarTrafego() {
            const resposta = await getData("/trafego/");
            if (resposta && resposta.dados) {
                preencherTabela("tabelaTrafego", resposta.dados, ["id", "linha", "veiculo_id", "motorista", "status"]);
            }
        }

        document.getElementById("formTrafego").addEventListener("submit", async function(e) {
            e.preventDefault();

            const payload = {
                linha: document.getElementById("linha").value,
                veiculo_id: Number(document.getElementById("veiculo_id").value),
                motorista: document.getElementById("motorista").value
            };

            const ok = await postData("/trafego/", payload);
            if (ok) {
                this.reset();
                carregarTrafego();
            }
        });

        carregarTrafego();
    </script>
</body>
</html>
