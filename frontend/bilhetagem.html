<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bilhetagem - Aurora ERP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Módulo de Bilhetagem</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="manutencao.html">Manutenção</a>
            <a href="tripulacao.html">Tripulação</a>
            <a href="trafego.html">Tráfego</a>
            <a href="suprimentos.html">Suprimentos</a>
            <a href="bilhetagem.html">Bilhetagem</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-card">
            <h2>Registrar bilhetagem</h2>
            <form id="formBilhetagem">
                <input type="text" id="tipo" placeholder="Tipo" required>
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <input type="number" step="0.01" id="valor_total" placeholder="Valor total" required>
                <button type="submit">Salvar bilhetagem</button>
            </form>
        </div>

        <div class="table-container">
            <h2>Lista de bilhetagem</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tipo</th>
                        <th>Quantidade</th>
                        <th>Valor Total</th>
                    </tr>
                </thead>
                <tbody id="tabelaBilhetagem"></tbody>
            </table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        async function carregarBilhetagem() {
            const resposta = await getData("/bilhetagem/");
            if (resposta && resposta.dados) {
                preencherTabela("tabelaBilhetagem", resposta.dados, ["id", "tipo", "quantidade", "valor_total"]);
            }
        }

        document.getElementById("formBilhetagem").addEventListener("submit", async function(e) {
            e.preventDefault();

            const payload = {
                tipo: document.getElementById("tipo").value,
                quantidade: Number(document.getElementById("quantidade").value),
                valor_total: Number(document.getElementById("valor_total").value)
            };

            const ok = await postData("/bilhetagem/", payload);
            if (ok) {
                this.reset();
                carregarBilhetagem();
            }
        });

        carregarBilhetagem();
    </script>
</body>
</html>
